name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 51)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (one bullet per line, no leading dashes)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    name: Build, publish GitHub release, upload to e.g.o
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gettext

      - name: Bump version in Makefile
        run: |
          sed -i "s/^VERSION  := .*/VERSION  := ${{ inputs.version }}/" Makefile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Makefile
          if git diff --cached --quiet; then
            echo "Makefile already at version ${{ inputs.version }}, skipping commit"
          else
            git commit -m "Bump to version ${{ inputs.version }}"
            git push
          fi

      - name: Build extension zip
        run: make zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(echo "${{ inputs.release_notes }}" | sed 's/^/- /')
          gh release create "v${{ inputs.version }}" \
            "soft-brightness-plus@joelkitching.com.v${{ inputs.version }}.shell-extension.zip" \
            --title "Version ${{ inputs.version }}" \
            --notes "${NOTES}"

      - name: Upload to extensions.gnome.org
        if: ${{ env.EGO_USER != '' }}
        env:
          EGO_USER: ${{ secrets.EGO_USER }}
          EGO_PASSWORD: ${{ secrets.EGO_PASSWORD }}
        run: |
          sudo apt-get install -y libjson-glib-dev libgnome-autoar-0-dev libsoup-3.0-dev gettext meson
          git clone --no-checkout --depth=1 \
            https://gitlab.gnome.org/GNOME/gnome-shell.git /tmp/gnome-shell-src
          cd /tmp/gnome-shell-src
          git sparse-checkout init
          git sparse-checkout set subprojects/extensions-tool
          git checkout main
          meson setup /tmp/ext-tool-build \
            /tmp/gnome-shell-src/subprojects/extensions-tool \
            -Dman=false
          ninja -C /tmp/ext-tool-build
          cd "$GITHUB_WORKSPACE"
          /tmp/ext-tool-build/src/gnome-extensions upload \
            --user="${EGO_USER}" \
            --password="${EGO_PASSWORD}" \
            --accept-tos \
            "soft-brightness-plus@joelkitching.com.v${{ inputs.version }}.shell-extension.zip"

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v50). Use to retrigger a failed release after fixing the issue.'
        required: true

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  # Triggered by a tag push (v*) or manually via workflow_dispatch.
  # Checks out the tagged commit, builds the zip from source, extracts release
  # notes from the README changelog, creates the GitHub release, and attaches
  # the zip. Fails early if no changelog entry exists for the version.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      zip-name: ${{ steps.ver.outputs.zip-name }}
    steps:
      - name: Resolve tag and version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          ZIP="soft-brightness-plus@joelkitching.com.v${VERSION}.shell-extension.zip"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip-name=${ZIP}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gettext

      - name: Build extension zip
        run: make zip VERSION=${{ steps.ver.outputs.version }}

      - name: Extract release notes from README
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk "/^### Version ${VERSION}$/{found=1; next} found && /^### /{exit} found{print}" \
            README.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "ERROR: No '### Version ${VERSION}' section found in README.md."
            echo "Add a changelog entry under '### Version ${VERSION}' before tagging."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          ZIP="${{ steps.ver.outputs.zip-name }}"
          # Delete any existing release for this tag (idempotent retrigger via workflow_dispatch)
          gh release delete "${TAG}" --yes 2>/dev/null || true
          gh release create "${TAG}" \
            --title "Version ${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "${ZIP}"

      - name: Save zip as artifact for ego-deploy
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: ${{ steps.ver.outputs.zip-name }}
          retention-days: 1

  # ── Deploy to extensions.gnome.org ──────────────────────────────────────────
  # Requires human approval via the "ego-deploy" GitHub Environment before it
  # runs. Set up the environment in repo Settings → Environments → ego-deploy,
  # add yourself as a required reviewer, and store EGO_USER + EGO_PASSWORD
  # there. The credentials never leave the environment until you approve.
  #
  # Security note: credentials live in the environment, not repo-level secrets,
  # so a pushed workflow change cannot access them without your explicit
  # approval. We build our own upload tool rather than using a third-party
  # action so no external code handles the password.
  ego-deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ego-deploy
    steps:
      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Upload to extensions.gnome.org
        env:
          EGO_USER: ${{ secrets.EGO_USER }}
          EGO_PASSWORD: ${{ secrets.EGO_PASSWORD }}
          EGO_ZIP: ${{ needs.build.outputs.zip-name }}
        run: |
          if [ -z "${EGO_USER}" ] || [ -z "${EGO_PASSWORD}" ]; then
            echo "EGO_USER/EGO_PASSWORD not set in ego-deploy environment — skipping"
            exit 0
          fi
          pip install requests --quiet
          python3 <<'PYEOF'
          import os, sys, requests

          BASE = "https://extensions.gnome.org"
          user = os.environ["EGO_USER"]
          password = os.environ["EGO_PASSWORD"]
          zip_path = os.environ["EGO_ZIP"]

          s = requests.Session()

          # Fetch login page to obtain CSRF token
          r = s.get(f"{BASE}/accounts/login/")
          r.raise_for_status()
          csrf = s.cookies.get("csrftoken", "")
          print(f"Fetched login page (status {r.status_code}), CSRF: {csrf[:8]}...")

          # Log in
          r = s.post(f"{BASE}/accounts/login/",
              data={
                  "csrfmiddlewaretoken": csrf,
                  "username": user,
                  "password": password,
                  "next": "/",
              },
              headers={"Referer": f"{BASE}/accounts/login/"},
              allow_redirects=True)
          if "accounts/login" in r.url:
              print(f"Login failed (still on login page): {r.status_code}")
              print(r.text[:500])
              sys.exit(1)
          csrf = s.cookies.get("csrftoken", "")
          print(f"Logged in (final URL: {r.url})")

          # Upload zip
          print(f"Uploading {zip_path}...")
          with open(zip_path, "rb") as f:
              r = s.post(f"{BASE}/extensions/upload/",
                  files={"source": (os.path.basename(zip_path), f, "application/zip")},
                  data={"csrfmiddlewaretoken": csrf},
                  headers={"X-CSRFToken": csrf, "Referer": f"{BASE}/"},
                  allow_redirects=True)

          print(f"Upload response: {r.status_code}")
          print(r.text[:1000])
          if r.status_code not in (200, 201):
              sys.exit(1)
          print("Upload complete!")
          PYEOF

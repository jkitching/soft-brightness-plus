name: Build and Test GNOME Extension

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gettext

      - name: Run unit tests
        run: make test

  build:
    runs-on: ubuntu-latest
    name: Build extension zip
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin gettext

      - name: Build extension
        run: make zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: build/extension.zip

  # Images build on ghcr.io/jkitching/gnome-shell-XY (x11docker-gnome;
  # Fedora N = GNOME N). The x11 lane runs only where stock GNOME still
  # ships an X11 session (< 49); e2e.sh skips it automatically elsewhere.
  e2e:
    runs-on: ubuntu-latest
    name: E2E GNOME ${{ matrix.gnome }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        gnome: [45, 46, 47, 48, 49, 50]
    steps:
      - uses: actions/checkout@v4

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: build/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E tests
        run: GNOME_VERSION=${{ matrix.gnome }} test/e2e.sh

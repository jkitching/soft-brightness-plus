name: Build and Test GNOME Extension

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gettext

      - name: Run unit tests
        run: make test

  build:
    runs-on: ubuntu-latest
    name: Build extension zip
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin gettext

      - name: Build extension
        run: make zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: build/extension.zip

  e2e:
    runs-on: ubuntu-latest
    name: E2E (container)
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: build/

      - name: Run E2E tests
        run: test/e2e.sh

  e2e-gnome49:
    runs-on: ubuntu-latest
    name: E2E GNOME 49 (Fedora 43)
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: build/

      - name: Build GNOME 49 test image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t sbp-e2e-gnome49 \
            -f test/e2e/Dockerfile.gnome49 \
            test/e2e/

      - name: Run E2E tests (GNOME 49, wayland)
        run: |
          docker run --rm \
            -v "$PWD/build/extension.zip:/ext.zip:ro" \
            sbp-e2e-gnome49 \
            /run-test.sh wayland

      - name: Run E2E tests (GNOME 49, x11)
        run: |
          docker run --rm \
            -v "$PWD/build/extension.zip:/ext.zip:ro" \
            sbp-e2e-gnome49 \
            /run-test.sh x11

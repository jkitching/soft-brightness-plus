name: Build and Test GNOME Extension

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gettext

      - name: Run unit tests
        run: make test

  build:
    runs-on: ubuntu-latest
    name: Build extension zip
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin gettext

      - name: Build extension
        run: make zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: build/extension.zip

  e2e:
    runs-on: ubuntu-latest
    name: E2E (container)
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: build/

      - name: Run E2E tests
        run: test/e2e.sh

  e2e-gnome49:
    runs-on: ubuntu-latest
    name: E2E GNOME 49 (Fedora 43)
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: gnome49-${{ hashFiles('x11docker-gnome/gnome-shell-49.Dockerfile') }}

      - name: Load cached image (if available)
        run: |
          if [ -f /tmp/docker-cache/gnome-shell-49.tar ]; then
            docker load < /tmp/docker-cache/gnome-shell-49.tar
          fi

      - name: Build GNOME 49 test image
        run: |
          if ! docker image inspect gnome-shell-49 >/dev/null 2>&1; then
            DOCKER_BUILDKIT=1 docker build \
              -t gnome-shell-49 \
              -f x11docker-gnome/gnome-shell-49.Dockerfile \
              x11docker-gnome/
          fi

      - name: Save image to cache
        run: |
          mkdir -p /tmp/docker-cache
          docker save gnome-shell-49 > /tmp/docker-cache/gnome-shell-49.tar

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: build/

      - name: Run GNOME 49 tests
        run: bash x11docker-gnome/test-extension.sh 49 "$PWD"
